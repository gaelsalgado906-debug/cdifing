<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventana de Interfaz de Usuario</title>
    <style>
        /* Fondo general de la página con temática oscura */
        body {
            margin: 0;
            padding: 0;
            background-color: #121214;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Contenedor principal de la ventana (Estilo Windows/Mac moderno) */
        .window-container {
            width: 85%;
            max-width: 900px;
            height: 550px;
            background-color: #1e1e1e;
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #2d2d30;
        }

        /* Barra superior o de título */
        .window-header {
            background-color: #1a1a1c;
            height: 45px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #2d2d30;
            user-select: none;
        }

        /* Contenedor para los círculos de colores de control */
        .window-buttons {
            display: flex;
            gap: 8px;
        }

        /* Estilo base para los círculos de control */
        .circle {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .circle:hover {
            opacity: 0.8;
        }

        /* Colores de las acciones de ventana */
        .circle.red { background-color: #ff5f56; }
        .circle.yellow { background-color: #ffbd2e; }
        .circle.green { background-color: #27c93f; }

        /* Título de la ventana en la barra */
        .window-title {
            color: #8e8e93;
            font-size: 13px;
            margin-left: 24px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Contenedor del contenido (Donde se muestra tu GIF) */
        .window-content {
            flex: 1;
            /* Carga la ruta exacta de tu archivo local usando formato web correcto */
            background-image: url('file:///C:/Users/GAEL0/OneDrive/Desktop/this%20gp/github%20tuto%20how.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #000000; /* Fondo de seguridad negro */
            position: relative;
        }
    </style>
</head>
<body>

    <div class="window-container">
        <div class="window-header">
            <div class="window-buttons">
                <div class="circle red" title="Cerrar"></div>
                <div class="circle yellow" title="Minimizar"></div>
                <div class="circle green" title="Maximizar"></div>
            </div>
            <div class="window-title">Terminal - github_tuto_how.gif</div>
        </div>
        
        <div class="window-content"></div>
    </div>

</body>
</html>
